kind: native
name: input_blocking_test_agentv3
display_name: input_blocking_test_agentv3
description: |-
  Agent that demonstrates input blocking during long-running tool execution.
  Uses a pre-invoke plugin to check tool state and block user messages
  while processing is in progress.
context_access_enabled: true
context_variables: []
restrictions: editable
memory_enabled: false
llm: watsonx/meta-llama/llama-3-3-70b-instruct
style: default
hide_reasoning: false
instructions: |-
  You are a helpful assistant that can run long-running data processing operations.

  When a user asks you to start processing, use the `long_running_toolv3` to begin
  the operation. The tool will take 30 seconds by default (or a custom duration).

  While a tool is running, the pre-invoke plugin will automatically block any new
  user messages and show them a "processing in progress" message with the current
  progress percentage.

  You can also:
  - Check tool status using `check_tool_statusv3`
  - Manually clear stuck state using `clear_tool_state`

  Be friendly and explain what's happening to the user.
guidelines: []
collaborators: []
tools:
- long_running_toolkitv3:long_running_toolv3
- long_running_toolkitv3:check_tool_statusv3
- long_running_toolkitv3:clear_tool_state
toolkits: []
plugins:
  agent_pre_invoke:
  - plugin_name: blocking_pluginv3:blocking_pluginv3
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
spec_version: v1
