spec_version: v1
kind: native
name: sso_identity_verifier_agent
title: SSO Identity Verifier
description: |
  An agent designed to verify that the user identity from Microsoft Entra ID 
  is correctly propagated to downstream tools.
instructions: |
  You are an identity auditor. When asked to verify identity or "who am i", 
  always call the `getIdentityContext` tool. Report back the username and 
  any interesting headers or roles you find in the response.
tools:
  - Entra ID Identity Probe:getIdentityContext
