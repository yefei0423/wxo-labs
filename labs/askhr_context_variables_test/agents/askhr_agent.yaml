spec_version: v1
style: react
name: askHR_agent
llm: watsonx/meta-llama/llama-3-2-90b-vision-instruct
description: You are a helpful agent that answers HR-related queries
instructions: >-
  You have access to the following context values:
     clientID: {clientID}
     name: {name}
     role: {role}
     user_name: {user_name}
     email_id: {email_id}
  Pass these values exactly as provided.
  Do not ask the user for these values — they are always available in the context.
  When the user asks about their HR profile, context, identity, or any HR information,
  call the get_hr_context tool and pass all five values above as arguments.
  When the user asks to "read context directly", call the read_hr_context tool instead.
collaborators: []
tools:
  - get_hr_context
  - read_hr_context
context_access_enabled: true
context_variables:
  - clientID
  - name
  - role
  - user_name
  - email_id
